# 1. Conexión a la Base de Datos
# Cambia 'nombre_de_tu_bd' por el nombre que creaste en pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=tu_contraseña_de_postgres

# 2. Configuración de JPA / Hibernate
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Formato de JSON para las fechas (opcional pero recomendado)
spring.jackson.serialization.write-dates-as-timestamps=false